name: CI/CD Pipeline - Backend Node.js

# -----------------------------------------------------------------------------
# 1. TRIGGERS: cuándo se ejecuta el pipeline
# -----------------------------------------------------------------------------
on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Entorno destino'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
  schedule:
    - cron: '0 3 * * 1'     # escaneo de seguridad semanal (lunes 3:00 UTC)

# -----------------------------------------------------------------------------
# 2. CONCURRENCIA
# -----------------------------------------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# -----------------------------------------------------------------------------
# 3. PERMISOS
# -----------------------------------------------------------------------------
permissions:
  contents: read
  security-events: write   # necesario si subes SARIF de Semgrep a GitHub Security
  packages: write

# -----------------------------------------------------------------------------
# 4. VARIABLES DE ENTORNO GLOBALES
# -----------------------------------------------------------------------------
env:
  NODE_ENV: test
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ===========================================================================
  # JOB 1: LINT
  # ===========================================================================
  lint:
    name: Lint & Formato
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier (comprobación de formato)
        run: npm run format:check

  # ===========================================================================
  # JOB 2: TEST
  # ===========================================================================
  test:
    name: Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests unitarios e integración con cobertura
        run: npm run test:coverage

      - name: Subir informe de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-node${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

      - name: Publicar cobertura en Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ===========================================================================
  # JOB 3: SEGURIDAD
  # ===========================================================================
  security:
    name: Análisis de seguridad
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      # --- SCA: dependencias vulnerables ---
      - name: npm audit (vulnerabilidades conocidas)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Dependency Review (solo en PRs)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      # --- SAST: análisis estático de código con Semgrep ---
      - name: Semgrep (SAST)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/javascript
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # --- Detección de secretos filtrados en el repo ---
      - name: Escaneo de secretos (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # JOB 4: BUILD
  # ===========================================================================
  build:
    name: Build & Push imagen Docker
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en el registro de contenedores
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadatos (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build y push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # JOB 5: DEPLOY STAGING
  # ===========================================================================
  deploy-staging:
    name: Deploy a Staging
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
      url: https://staging.miapp.ejemplo.com
    steps:
      - name: Desplegar en staging
        run: 'echo "Aquí iría el comando real: kubectl, terraform, ssh, etc."'

  # ===========================================================================
  # JOB 6: DEPLOY PRODUCTION
  # ===========================================================================
  deploy-production:
    name: Deploy a Producción
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://miapp.ejemplo.com
    steps:
      - name: Desplegar en producción
        run: echo "Despliegue real a producción"

  # ===========================================================================
  # JOB 7: NOTIFICACIÓN
  # ===========================================================================
  notify:
    name: Notificar resultado
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    steps:
      - name: Notificar a Slack
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {"text": " Pipeline falló en ${{ github.repository }} (${{ github.ref }})"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}